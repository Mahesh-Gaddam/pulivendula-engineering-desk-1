<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulivendula Engineering Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-6xl mx-auto p-4">
    <h1 class="text-3xl font-bold text-center text-blue-900">Pulivendula Municipality</h1>
    <h2 class="text-xl text-center mb-8">Engineering Complaint Desk</h2>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats"></div>

    <div class="bg-white p-6 rounded-2xl shadow mb-8">
      <h3 class="text-2xl font-semibold mb-4">Register New Complaint</h3>
      <form id="complaintForm" class="space-y-4">
        <input type="text" id="name" placeholder="Your Full Name" required class="w-full p-4 border rounded-xl">
        <input type="tel" id="phone" placeholder="Phone Number" required class="w-full p-4 border rounded-xl">
        <input type="text" id="location" placeholder="Area / Ward / Landmark" required class="w-full p-4 border rounded-xl">
        <select id="issueType" required class="w-full p-4 border rounded-xl">
          <option value="">Select Issue Type</option>
          <option>Road Damage</option>
          <option>Water Supply Problem</option>
          <option>Drainage / Sewage</option>
          <option>Street Light Not Working</option>
          <option>Garbage Collection</option>
          <option>Others</option>
        </select>
        <textarea id="description" rows="4" placeholder="Describe the problem..." required class="w-full p-4 border rounded-xl"></textarea>
        <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold">Submit Complaint</button>
      </form>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
      <h3 class="text-2xl font-semibold mb-4">All Complaints</h3>
      <div id="complaintsList" class="space-y-4"></div>
    </div>
  </div>

  <script>
    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('stats').innerHTML = `
        <div class="bg-white p-6 rounded-2xl shadow text-center">
          <p class="text-red-600 text-sm">Needs AE Action</p>
          <p class="text-4xl font-bold">${data.pending}</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow text-center">
          <p class="text-yellow-600 text-sm">Work in Progress</p>
          <p class="text-4xl font-bold">${data.inProgress}</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow text-center">
          <p class="text-green-600 text-sm">Resolved</p>
          <p class="text-4xl font-bold">${data.resolved}</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow text-center">
          <p class="text-blue-600 text-sm">Total</p>
          <p class="text-4xl font-bold">${data.total}</p>
        </div>
      `;
    }

    async function loadComplaints() {
      const res = await fetch('/api/complaints');
      const complaints = await res.json();
      const container = document.getElementById('complaintsList');
      container.innerHTML = complaints.map(c => `
        <div class="border rounded-xl p-4">
          <div class="flex justify-between items-start">
            <div>
              <p class="font-semibold">${c.name}</p>
              <p class="text-sm text-gray-600">${c.location} • ${c.issueType}</p>
            </div>
            <span class="px-3 py-1 rounded-full text-xs ${c.status === 'Resolved' ? 'bg-green-100 text-green-700' : c.status === 'In Progress' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}">
              ${c.status}
            </span>
          </div>
          <p class="mt-3 text-sm">${c.description}</p>
        </div>
      `).join('');
    }

    document.getElementById('complaintForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        location: document.getElementById('location').value,
        issueType: document.getElementById('issueType').value,
        description: document.getElementById('description').value
      };

      await fetch('/api/complaints', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });

      alert('✅ Complaint Submitted Successfully!');
      e.target.reset();
      loadStats();
      loadComplaints();
    });

    loadStats();
    loadComplaints();
    setInterval(() => { loadStats(); loadComplaints(); }, 15000);
  </script>
</body>
</html>
