<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulivendula Engineering Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold text-center text-blue-900">Pulivendula Municipality</h1>
    <h2 class="text-xl text-center mb-8">Engineering Complaint Desk</h2>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats"></div>

    <div class="flex border-b mb-6">
      <button onclick="showTab(0)" class="flex-1 py-3 text-blue-600 border-b-2 border-blue-600 font-medium" id="tab0">Register</button>
      <button onclick="showTab(1)" class="flex-1 py-3 text-gray-600" id="tab1">All Complaints</button>
      <button onclick="showTab(2)" class="flex-1 py-3 text-gray-600" id="tab2">AE Admin</button>
    </div>

    <!-- Register -->
    <div id="content0">
      <form id="complaintForm" class="bg-white p-6 rounded-2xl shadow space-y-4">
        <input type="text" id="name" placeholder="Your Full Name" required class="w-full p-4 border rounded-xl">
        <input type="tel" id="phone" placeholder="Phone Number" required class="w-full p-4 border rounded-xl">
        <input type="text" id="location" placeholder="Area / Ward" required class="w-full p-4 border rounded-xl">
        <select id="issueType" required class="w-full p-4 border rounded-xl">
          <option value="">Select Issue Type</option>
          <option>Road Damage</option>
          <option>Water Supply Problem</option>
          <option>Drainage</option>
          <option>Street Light</option>
          <option>Garbage</option>
          <option>Others</option>
        </select>
        <textarea id="description" rows="4" placeholder="Describe the problem..." required class="w-full p-4 border rounded-xl"></textarea>
        <button type="submit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold">Submit Complaint</button>
      </form>
    </div>

    <!-- All Complaints -->
    <div id="content1" class="hidden bg-white p-6 rounded-2xl shadow">
      <div id="complaintsList" class="space-y-4"></div>
    </div>

    <!-- Admin -->
    <div id="content2" class="hidden bg-white p-6 rounded-2xl shadow">
      <input type="password" id="adminPass" placeholder="Admin Password" class="w-full p-4 border rounded-xl mb-4">
      <button onclick="loginAdmin()" class="w-full bg-green-700 text-white py-4 rounded-xl font-bold">Login as AE</button>
      <div id="adminArea" class="hidden mt-6">
        <div id="adminComplaints" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "admin123";

    async function loadStats() {
      const res = await fetch('/api/stats');
      const data = await res.json();
      document.getElementById('stats').innerHTML = `
        <div class="bg-white p-6 rounded-2xl shadow text-center"><p class="text-red-600">Needs AE Action</p><p class="text-4xl font-bold">${data.pending}</p></div>
        <div class="bg-white p-6 rounded-2xl shadow text-center"><p class="text-yellow-600">Work in Progress</p><p class="text-4xl font-bold">${data.inProgress}</p></div>
        <div class="bg-white p-6 rounded-2xl shadow text-center"><p class="text-green-600">Resolved</p><p class="text-4xl font-bold">${data.resolved}</p></div>
        <div class="bg-white p-6 rounded-2xl shadow text-center"><p class="text-blue-600">Total</p><p class="text-4xl font-bold">${data.total}</p></div>
      `;
    }

    async function loadComplaints() {
      const res = await fetch('/api/complaints');
      const complaints = await res.json();
      const html = complaints.map(c => `
        <div class="border p-4 rounded-xl">
          <div class="flex justify-between">
            <strong>${c.name} - ${c.location}</strong>
            <span>${c.status}</span>
          </div>
          <p>${c.issueType}</p>
          <p class="text-sm">${c.description}</p>
        </div>
      `).join('');
      document.getElementById('complaintsList').innerHTML = html || '<p>No complaints yet</p>';
    }

    function loginAdmin() {
      if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
        document.getElementById('adminArea').classList.remove('hidden');
        loadComplaints(); // reuse for admin
      } else {
        alert('Wrong Password! Use: admin123');
      }
    }

    function showTab(n) {
      document.querySelectorAll('#content0,#content1,#content2').forEach(d => d.classList.add('hidden'));
      document.getElementById('content'+n).classList.remove('hidden');
      if (n === 1) loadComplaints();
    }

    document.getElementById('complaintForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('name').value,
        phone: document.getElementById('phone').value,
        location: document.getElementById('location').value,
        issueType: document.getElementById('issueType').value,
        description: document.getElementById('description').value
      };
      await fetch('/api/complaints', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      alert('✅ Complaint Submitted!');
      e.target.reset();
      loadStats();
      loadComplaints();
    });

    loadStats();
    setInterval(loadStats, 10000);
  </script>
</body>
</html>
